<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="patient.css">
</head>
<body>
    <main class="home-shell">
        <h1>Hospital Management System</h1>

        <section class="form-card">
            <form action="/register" method="POST" autocomplete="off">
                <div class="form-row">
                    <label for="patientName">Patient Name:</label>
                    <input id="patientName" type="text" name="patientName" required placeholder="Enter full name">
                </div>
                <div class="form-row">
                    <label for="age">Age:</label>
                    <input id="age" type="number" name="age" min="0" required placeholder="Enter age">
                </div>
                <div class="form-row">
                    <label for="mobile">Mobile Number:</label>
                    <input id="mobile" type="tel" name="mobile" required placeholder="10-digit mobile number" pattern="[0-9]{10}" maxlength="10">
                </div>
                <div class="form-row">
                    <label for="registrationDateTime">Registration Date & Time:</label>
                    <input id="registrationDateTime" type="datetime-local" name="registrationDateTime" required>
                </div>
                <div class="form-row">
                    <label for="disease">Disease:</label>
                    <input id="disease" type="text" name="disease" required placeholder="Enter diagnosis">
                </div>

                <button type="submit">Register Patient</button>
            </form>

            <a href="/patients" class="view-btn">View Registered Patients</a>
        </section>
    </main>
</body>
</html>
